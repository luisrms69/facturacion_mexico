name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: main-facturacion_mexico-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    name: Server

    services:
      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*requirements.txt', '**/pyproject.toml', '**/setup.py', '**/setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install MariaDB Client
        run: sudo apt-get update && sudo apt-get install -y mariadb-client

      - name: Setup Bench
        run: |
          pip install frappe-bench
          bench init --skip-redis-config-generation --skip-assets \
            --python "$(which python)" \
            --frappe-branch version-16 \
            ~/frappe-bench
          mariadb --host 127.0.0.1 --port 3306 -u root -proot \
            -e "SET GLOBAL character_set_server = 'utf8mb4'"
          mariadb --host 127.0.0.1 --port 3306 -u root -proot \
            -e "SET GLOBAL collation_server = 'utf8mb4_unicode_ci'"

      - name: Install Apps
        working-directory: /home/runner/frappe-bench
        run: |
          bench get-app --branch version-16 erpnext
          bench get-app --branch develop payments
          bench get-app facturacion_mexico $GITHUB_WORKSPACE
          bench setup requirements --dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add to Hosts
        run: echo "127.0.0.1 test_facturacion" | sudo tee -a /etc/hosts

      - name: Create test site
        working-directory: /home/runner/frappe-bench
        run: |
          bench new-site test_facturacion \
            --mariadb-root-password root \
            --admin-password admin
          bench --site test_facturacion install-app erpnext
          bench --site test_facturacion install-app payments
          bench --site test_facturacion install-app facturacion_mexico
          bench --site test_facturacion set-config allow_tests true

      - name: Run Tests
        working-directory: /home/runner/frappe-bench
        run: bench --site test_facturacion run-tests --app facturacion_mexico --lightmode
        env:
          TYPE: server
