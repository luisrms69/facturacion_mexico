site_name: Facturación México - Documentación Técnica
site_description: Documentación completa del sistema de facturación electrónica para México
site_author: Equipo Desarrollo Facturación México

# Configuration
theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: blue
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: blue
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - content.code.copy
    - navigation.expand
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest

# Exclude quarantine and working_docs from MkDocs processing
exclude_docs: |
  _quarantine/

# Basic plugins
plugins:
  - search:
      lang: es

# Extensions
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

